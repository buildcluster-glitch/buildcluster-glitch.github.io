<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>単価表(モバイル) - ビルドクラスタ</title>
<style>
  :root{ --bg:#f1f5f9; --card:#fff; --line:#e2e8f0; --accent:#7c3aed; --text:#0f172a; --muted:#64748b; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--text); font-size:15px; }
  header{ position:sticky; top:0; z-index:10; background:var(--accent); color:#fff; padding:10px 12px; display:flex; align-items:center; gap:8px; }
  header h1{ font-size:16px; margin:0; flex:1; }
  header button{ background:rgba(255,255,255,.2); border:none; color:#fff; padding:6px 10px; border-radius:6px; font-size:13px; }
  .toolbar{ position:sticky; top:44px; z-index:9; background:var(--bg); padding:8px 10px; display:flex; gap:6px; flex-wrap:wrap; align-items:center; border-bottom:1px solid var(--line); }
  #search{ flex:1; min-width:140px; font-size:16px; padding:9px 12px; border:1px solid var(--line); border-radius:8px; }
  #moto{ font-size:14px; padding:8px; border:1px solid var(--line); border-radius:8px; background:#fff; max-width:48%; }
  .meta{ font-size:11px; color:var(--muted); padding:4px 12px; }
  main{ padding:8px 10px 40px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; overflow:hidden; }
  .card-head{ display:flex; align-items:center; gap:10px; padding:11px 12px; cursor:pointer; }
  .card-head .nm{ flex:1; min-width:0; }
  .card-head .item{ font-weight:600; font-size:15px; line-height:1.3; }
  .card-head .cat{ font-size:11px; color:var(--muted); }
  .card-head .price{ font-size:18px; font-weight:700; color:#7c2d12; white-space:nowrap; text-align:right; }
  .card-head .price small{ font-size:10px; color:var(--muted); font-weight:normal; display:block; }
  .detail{ display:none; padding:6px 12px 12px; border-top:1px dashed var(--line); background:#fafafa; }
  .detail.open{ display:block; }
  .prow{ display:flex; justify-content:space-between; padding:4px 0; font-size:14px; border-bottom:1px solid #f1f5f9; }
  .prow b{ font-variant-numeric:tabular-nums; }
  .sec{ font-size:11px; color:var(--accent); font-weight:700; margin:8px 0 2px; }
  .kyaku{ background:#fffbeb; }
  .empty{ text-align:center; color:var(--muted); padding:40px 12px; }
  /* カテゴリ絞り込みチップ */
  .cats{ display:flex; gap:6px; overflow-x:auto; padding:6px 10px 8px; background:var(--bg); -webkit-overflow-scrolling:touch; border-bottom:1px solid var(--line); }
  .cats::-webkit-scrollbar{ display:none; }
  .chip{ flex:0 0 auto; font-size:13px; padding:7px 13px; border:1px solid var(--line); border-radius:18px; background:#fff; color:#334155; white-space:nowrap; }
  .chip.on{ background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
  .chip .n{ opacity:.6; font-size:11px; margin-left:3px; }
  /* カテゴリ見出し */
  .gh{ font-size:12px; font-weight:700; color:var(--accent); padding:10px 4px 4px; position:sticky; top:92px; background:var(--bg); z-index:5; }
  /* 設定 */
  #settings{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:20; align-items:flex-start; justify-content:center; padding:20px; }
  #settings.open{ display:flex; }
  .setbox{ background:#fff; border-radius:12px; width:100%; max-width:420px; padding:16px; }
  .setbox h2{ font-size:16px; margin:0 0 10px; }
  .setbox label{ font-size:12px; color:var(--muted); display:block; margin:8px 0 3px; }
  .setbox input{ width:100%; font-size:15px; padding:9px; border:1px solid var(--line); border-radius:8px; }
  .setbox .btns{ display:flex; gap:8px; margin-top:14px; }
  .setbox button{ flex:1; font-size:15px; padding:11px; border-radius:8px; border:none; }
  .setbox .save{ background:var(--accent); color:#fff; font-weight:600; }
  .setbox .cancel{ background:#e2e8f0; color:#334155; }
  .setbox .hint{ font-size:11px; color:var(--muted); margin-top:8px; line-height:1.5; }
</style>
</head>
<body>
<header>
  <h1>📋 単価表</h1>
  <button id="btn-reload">🔄 更新</button>
  <button id="btn-settings">⚙</button>
</header>
<div class="toolbar">
  <input id="search" type="search" placeholder="🔍 工事名・カテゴリで検索" autocomplete="off">
  <select id="moto"></select>
</div>
<div class="cats" id="cats"></div>
<div class="meta" id="meta"></div>
<main id="list"><div class="empty">⚙設定でGAS URL・トークンを入れて「更新」を押してください</div></main>

<div id="settings">
  <div class="setbox">
    <h2>⚙ 接続設定</h2>
    <label>master_sync GAS URL (.../exec)</label>
    <input id="set-url" placeholder="https://script.google.com/macros/s/.../exec">
    <label>トークン</label>
    <input id="set-token" placeholder="共有トークン">
    <div class="btns">
      <button class="cancel" id="set-cancel">キャンセル</button>
      <button class="save" id="set-save">保存して取得</button>
    </div>
    <div class="hint">PCの自社工事管理アプリ → 設定 の「master_sync」のURL・トークンと同じ値を入れてください（一度入れれば保存されます）。<br>※単価はPC側「単価マスタ → 📱スマホ単価表へ共有」で更新されます。</div>
  </div>
</div>

<script>
const LS = { url:'tanka_gas_url', token:'tanka_gas_token', moto:'tanka_moto' };
let DATA = null; // {updatedAt, motoCols, items}
let curCat = ''; // 選択中カテゴリ('' = すべて)
const $ = s => document.querySelector(s);
const fmt = n => n ? '¥'+Number(n).toLocaleString() : '—';

function openSettings(){
  $('#set-url').value = localStorage.getItem(LS.url)||'';
  $('#set-token').value = localStorage.getItem(LS.token)||'';
  $('#settings').classList.add('open');
}
function closeSettings(){ $('#settings').classList.remove('open'); }
$('#btn-settings').onclick = openSettings;
$('#set-cancel').onclick = closeSettings;
$('#set-save').onclick = () => {
  localStorage.setItem(LS.url, $('#set-url').value.trim());
  localStorage.setItem(LS.token, $('#set-token').value.trim());
  closeSettings(); load();
};

async function load(){
  const url = (localStorage.getItem(LS.url)||'').trim();
  const token = (localStorage.getItem(LS.token)||'').trim();
  if(!url || !token){ openSettings(); return; }
  $('#list').innerHTML = '<div class="empty">読み込み中…</div>';
  try{
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'get-shared-config', key:'price_master', token }) });
    const d = await r.json();
    if(!d.ok) throw new Error(d.error||'failed');
    if(!d.value){ $('#list').innerHTML = '<div class="empty">単価データがまだありません。<br>PC側で「📱スマホ単価表へ共有」を押してください。</div>'; return; }
    DATA = JSON.parse(d.value);
    buildMotoSelect();
    buildCats();
    render();
  }catch(e){
    $('#list').innerHTML = '<div class="empty">取得エラー: '+ (e.message||e) +'<br><br>⚙設定のURL/トークンを確認してください</div>';
  }
}
function buildMotoSelect(){
  const sel = $('#moto'); const cols = (DATA.motoCols||[]);
  const saved = localStorage.getItem(LS.moto);
  sel.innerHTML = cols.map(c => `<option value="${esc(c)}">${esc(c)}単価</option>`).join('') + '<option value="__tenant__">入居者単価</option><option value="__owner__">家主単価</option>';
  if(saved && [...sel.options].some(o=>o.value===saved)) sel.value = saved;
  sel.onchange = () => { localStorage.setItem(LS.moto, sel.value); render(); };
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function buildCats(){
  const counts = {};
  (DATA.items||[]).forEach(it => { const c = it.cat||'(未分類)'; counts[c] = (counts[c]||0)+1; });
  const cats = Object.keys(counts);
  if(curCat && !counts[curCat]) curCat = '';
  const chips = [`<button class="chip ${curCat===''?'on':''}" data-cat="">すべて<span class="n">${(DATA.items||[]).length}</span></button>`]
    .concat(cats.map(c => `<button class="chip ${curCat===c?'on':''}" data-cat="${esc(c)}">${esc(c)}<span class="n">${counts[c]}</span></button>`));
  const el = document.getElementById('cats');
  el.innerHTML = chips.join('');
  el.querySelectorAll('.chip').forEach(b => b.onclick = () => {
    curCat = b.dataset.cat;
    el.querySelectorAll('.chip').forEach(x => x.classList.toggle('on', x.dataset.cat===curCat));
    render();
    window.scrollTo(0,0);
  });
}

function priceForRow(it, motoKey){
  if(motoKey==='__tenant__') return it.tenant;
  if(motoKey==='__owner__') return it.owner;
  return (it.prices||{})[motoKey] || 0;
}
function render(){
  if(!DATA){ return; }
  const terms = $('#search').value.trim().toLowerCase().split(/[\s　]+/).filter(Boolean); // 複数語AND
  const motoKey = $('#moto').value;
  const motoLabel = $('#moto').selectedOptions[0]?.textContent || '';
  let items = (DATA.items||[]);
  if(curCat) items = items.filter(it => (it.cat||'(未分類)')===curCat);
  if(terms.length) items = items.filter(it => {
    const hay = (it.item+' '+it.cat+' '+(it.partNo||'')).toLowerCase();
    return terms.every(t => hay.includes(t));
  });
  const up = DATA.updatedAt ? new Date(DATA.updatedAt) : null;
  $('#meta').textContent = `${items.length}件${(curCat||terms.length)?` / 全${(DATA.items||[]).length}`:''}${up?` ／ 更新 ${up.getMonth()+1}/${up.getDate()} ${String(up.getHours()).padStart(2,'0')}:${String(up.getMinutes()).padStart(2,'0')}`:''} ／ 単価: ${motoLabel}`;
  if(!items.length){ $('#list').innerHTML = '<div class="empty">該当なし<br><small>カテゴリ「すべて」や別の語で試してください</small></div>'; return; }
  // カテゴリ見出しでグルーピング(全件表示時に区切りを出す)
  const showGroups = !curCat;
  let html = '', lastCat = null;
  items.forEach((it,i) => {
    const c = it.cat||'(未分類)';
    if(showGroups && c!==lastCat){ html += `<div class="gh">${esc(c)}</div>`; lastCat = c; }
    const p = priceForRow(it, motoKey);
    const motoRows = (DATA.motoCols||[]).filter(col => (it.prices||{})[col]).map(col => `<div class="prow"><span>${esc(col)}</span><b>${fmt(it.prices[col])}</b></div>`).join('');
    html += `<div class="card">
      <div class="card-head" data-i="${i}">
        <div class="nm"><div class="item">${esc(it.item)}</div><div class="cat">${esc(it.cat)}${it.unit?' / '+esc(it.unit):''}${it.partNo?' / '+esc(it.partNo):''}</div></div>
        <div class="price">${fmt(p)}<small>${esc(motoLabel)}</small></div>
      </div>
      <div class="detail" id="d${i}">
        <div class="sec">🏢 元請別単価</div>
        ${motoRows || '<div class="prow"><span style="color:#94a3b8;">(元請別単価なし)</span></div>'}
        <div class="sec">🧹 客出し単価</div>
        <div class="prow kyaku"><span>入居者単価</span><b>${fmt(it.tenant)}</b></div>
        <div class="prow kyaku"><span>家主単価</span><b>${fmt(it.owner)}</b></div>
        ${it.material?`<div class="sec">🧱 材料費</div><div class="prow"><span>材料費</span><b>${fmt(it.material)}</b></div>`:''}
      </div>
    </div>`;
  });
  $('#list').innerHTML = html;
  document.querySelectorAll('.card-head').forEach(h => h.onclick = () => {
    $('#d'+h.dataset.i).classList.toggle('open');
  });
}
$('#search').addEventListener('input', render);
$('#btn-reload').onclick = load;
// 起動
load();
</script>
</body>
</html>
